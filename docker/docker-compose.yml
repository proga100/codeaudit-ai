services:
  postgres:
    image: postgres:16-alpine
    container_name: codeaudit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codeaudit
      POSTGRES_PASSWORD: codeaudit_dev_password
      POSTGRES_DB: codeaudit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeaudit -d codeaudit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codeaudit-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_dev_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: codeaudit_postgres_data
  redis_data:
    name: codeaudit_redis_data
